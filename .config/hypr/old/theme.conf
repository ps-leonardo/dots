exec = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'

general {
    gaps_in = 5
    gaps_out = 10
    layout = dwindle
    resize_on_border = false
}

decoration {
    rounding = 20
    rounding_power = 2

    blur {
        enabled = true
        size = 3
        passes = 2
        new_optimizations = on
        ignore_opacity = on
        xray = false
        vibrancy = 0.1696
    }

    shadow {
        enabled = false
      }
}
